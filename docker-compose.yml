services:
  # Build-only service: produces the fim-sandbox:python image used by
  # DockerBackend for python_exec / shell_exec.  Starts, exits immediately,
  # and is never restarted — its only purpose is to ensure the image exists.
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: fim-sandbox:python
    command: ["true"]
    restart: "no"

  fim-one:
    build: .
    mem_limit: 1400m
    mem_reservation: 512m
    ports:
      - "3000:3000"   # Next.js frontend (API is proxied internally via rewrites)
      - "8000:8000"   # Python API backend (for direct SSE streaming via NGINX)
    volumes:
      - ./data:/app/data             # Vector store (lancedb) + misc data
      - ./uploads:/app/uploads       # User-uploaded files (REQUIRED)
      # Code sandbox: mount Docker socket to run AI-generated code in isolated containers.
      # Required when CODE_EXEC_BACKEND=docker in .env (recommended for multi-user deployments).
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env
    environment:
      # Internal services — auto-configured by compose, no user action needed.
      DATABASE_URL: postgresql+asyncpg://fim:fim@postgres:5432/fim_one
      REDIS_URL: redis://redis:6379/0
      # DooD sandbox: host-side absolute path of the ./data volume mount.
      # The sandbox writes scripts to /app/data/sandbox/ inside the container;
      # this tells DockerBackend the corresponding host path for -v bind mounts.
      # ${PWD} is resolved by Docker Compose to the host project directory.
      DOCKER_HOST_DATA_DIR: ${DOCKER_HOST_DATA_DIR:-${PWD}/data}
      # Use the pre-built sandbox image with common packages (pdfplumber, pandas, etc.)
      DOCKER_PYTHON_IMAGE: fim-sandbox:python
      DOCKER_SHELL_IMAGE: fim-sandbox:python
    depends_on:
      sandbox:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Production: put an Nginx reverse proxy in front for HTTPS + custom domain.
    # Example: nginx → http://fim-one:3000

  postgres:
    image: postgres:16-alpine
    mem_limit: 350m
    mem_reservation: 128m
    environment:
      POSTGRES_USER: fim
      POSTGRES_PASSWORD: fim
      POSTGRES_DB: fim_one
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fim -d fim_one"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    mem_limit: 200m
    mem_reservation: 64m
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
